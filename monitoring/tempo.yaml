server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m               # Как часто нарезать блоки данных
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1

storage:
  trace:
    backend: local                     # Храним данные локально
    wal:
      path: /var/tempo/wal             # Write Ahead Log
    local:
      path: /var/tempo/blocks          # Финальное хранилище блоков

compactor:
  ring:
    kvstore:
      store: memberlist
  compaction:
    block_retention: 24h               # Сколько хранить трейсы (измените под себя)
    compacted_block_retention: 1h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
              # Включаем генерацию метрик из трейсов

memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
  join_members:
    - 127.0.0.1                        # В single-binary режиме указываем себя