global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'notes-service'
    metrics_path: /notes-service/actuator/prometheus
    static_configs:
      - targets: ['notes-service:8090']
    relabel_configs:
      - target_label: service
        replacement: notes-service

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']