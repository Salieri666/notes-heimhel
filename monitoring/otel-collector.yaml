receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4327
        max_recv_msg_size_mib: 128
      http:
        endpoint: 0.0.0.0:4328

processors:
  batch:

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]