version: '3.8'

services:

  service-db:
    image: postgres:18.1
    restart: always
    container_name: service-db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -D postgres" ]
      interval: 5s
      timeout: 2s
      retries: 25
    ports:
      - "${POSTGRES_DB_PORT}:5432"
    volumes:
      - ./db/create_db.sql:/docker-entrypoint-initdb.d/create_db.sql
      - db-data:/var/lib/postgresql
    networks:
      - main_network

  keycloak-db:
    image: postgres:18.1
    restart: always
    container_name: keycloak-db
    environment:
      POSTGRES_USER: "${KEYCLOAK_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${KEYCLOAK_POSTGRES_DB}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER} -d ${KEYCLOAK_POSTGRES_DB}" ]
      interval: 5s
      timeout: 2s
      retries: 25
    volumes:
      - keycloak-db-data:/var/lib/postgresql
    ports:
      - "65432:5432"
    networks:
      - main_network

  keycloak-notes:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak-notes
    environment:
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_POSTGRES_DB}"
      KC_DB_USERNAME: "${KEYCLOAK_POSTGRES_USER}"
      KC_DB_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME}"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: "edge"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
      - "${KEYCLOAK_DEBUG_PORT}:9000"
    volumes:
      - ./init-keycloak-config/notes-realm.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - keycloak-db
    command: [ "start", "--http-enabled=true", "--import-realm" ]
    networks:
      - main_network

  notes-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: notes-service
    container_name: notes-service
    restart: unless-stopped
    env_file:
      - .env
    cap_add:
      - SYS_PTRACE
    ports:
      - "${SERVICE_PORT}:${SERVICE_PORT}"
    environment:
      NOTES_SCHEMA: "${NOTES_SCHEMA}"
      SERVICE_PORT: "${SERVICE_PORT}"
      POSTGRES_URL: "${POSTGRES_URL}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      ISSUER_URI: "${ISSUER_URI}"
      JWK_SET_URI: "${JWK_SET_URI}"

      OTEL_SERVICE_NAME: "${OTEL_NOTES_SERVICE_NAME}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL}"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER}"
      OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER}"
      OTEL_LOGS_EXPORTER: "${OTEL_LOGS_EXPORTER}"
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_NOTES_SERVICE_RESOURCE_ATTRIBUTES}"
      OTEL_TRACES_SAMPLER: "${OTEL_TRACES_SAMPLER}"
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG}"
      OTEL_EXPORTER_OTLP_COMPRESSION: "${OTEL_EXPORTER_OTLP_COMPRESSION}"
      OTEL_BLRP_MAX_EXPORT_BATCH_SIZE: "${OTEL_BLRP_MAX_EXPORT_BATCH_SIZE}"
      OTEL_BSP_MAX_EXPORT_BATCH_SIZE: "${OTEL_BSP_MAX_EXPORT_BATCH_SIZE}"
      OTEL_EXPORTER_OTLP_TIMEOUT: "${OTEL_EXPORTER_OTLP_TIMEOUT}"
      OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED: "${OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED}"
      OTEL_SDK_DISABLED: "${OTEL_SDK_DISABLED}"

      PYROSCOPE_APPLICATION_NAME: "${OTEL_NOTES_SERVICE_NAME}"
      PYROSCOPE_SERVER_ADDRESS: "${PYROSCOPE_SERVER_ADDRESS}"
      # CPU/itimer/wall — выбор CPU варианта (itimer/cpu/wall)
      PYROSCOPE_PROFILER_EVENT: "cpu"        # или "wall" или "itimer"
      # Включить профилирование аллокаций (threshold в байтах). Поставь не 0 в проде (high overhead)
      PYROSCOPE_PROFILER_ALLOC: "524288"     # 512 KB — стартовая точка
      # Включить профилирование lock/contended (threshold в наносекундах)
      PYROSCOPE_PROFILER_LOCK: "10000000"    # 10ms (пример)
      # Для одновременной поддержки нескольких event-типов иногда нужно использовать jfr формат:
      PYROSCOPE_FORMAT: "jfr"
      # частота выгрузки
      PYROSCOPE_UPLOAD_INTERVAL: "10s"
    depends_on:
      - service-db
    networks:
      - main_network

  otel-collector-service:
    image: otel/opentelemetry-collector-contrib:0.146.1
    container_name: otel-collector-service
    command: [ "--config=/etc/otel-collector.yaml" ]
    env_file:
      - .env
    volumes:
      - ./monitoring/otel-collector.yaml:/etc/otel-collector.yaml:ro
    depends_on:
      - loki
      - tempo
    networks:
      - main_network

  loki:
    image: grafana/loki:3.6.7
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    env_file:
      - .env
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - main_network

  tempo:
    image: grafana/tempo:2.10.1
    container_name: tempo
    user: "0"
    command: ["-config.file=/etc/tempo.yaml"]
    env_file:
      - .env
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - ./monitoring/tempo-data/wal:/var/tempo/wal
      - ./monitoring/tempo-data/blocks:/var/tempo/blocks
      - ./monitoring/tempo-data/generator-wal:/var/tempo/generator/wal
      - ./monitoring/tempo-data/generator-traces:/var/tempo/generator/traces
    depends_on:
      - loki
      - prometheus
    networks:
      - main_network

  prometheus:
    build: ./monitoring/prometheus
    container_name: prometheus
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./monitoring/prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - main_network

  pyroscope:
    image: grafana/pyroscope:1.17.4
    container_name: pyroscope
    env_file:
      - .env
    volumes:
      - pyroscope-data:/var/lib/pyroscope
    networks:
      - main_network

  grafana:
    image: grafana/grafana:12.4.0
    container_name: grafana
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "${GF_USERS_ALLOW_SIGN_UP}"
      GF_AUTH_ANONYMOUS_ENABLED: "${GF_AUTH_ANONYMOUS_ENABLED}"
      GF_SERVER_ROOT_URL: "${GF_SERVER_ROOT_URL}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "${GF_SERVER_SERVE_FROM_SUB_PATH}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - main_network

volumes:
  db-data:
  keycloak-db-data:
  loki-data:
  prometheus-data:
  pyroscope-data:
  grafana-data:

networks:
  main_network:
    name: main_network
    driver: bridge