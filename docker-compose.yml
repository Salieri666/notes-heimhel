version: '3.8'

services:

  service-db:
    image: postgres:18.1
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -D postgres" ]
      interval: 5s
      timeout: 2s
      retries: 25
    ports:
      - "${POSTGRES_DB_PORT}:5432"
    volumes:
      - ./db/create_db.sql:/docker-entrypoint-initdb.d/create_db.sql
      - db-data:/var/lib/postgresql
    networks:
      - main_network

  keycloak-db:
    image: postgres:18.1
    restart: always
    environment:
      POSTGRES_USER: "${KEYCLOAK_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${KEYCLOAK_POSTGRES_DB}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER} -d ${KEYCLOAK_POSTGRES_DB}" ]
      interval: 5s
      timeout: 2s
      retries: 25
    volumes:
      - keycloak-db-data:/var/lib/postgresql
    networks:
      - main_network

  keycloak-notes:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak-notes
    environment:
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_POSTGRES_DB}"
      KC_DB_USERNAME: "${KEYCLOAK_POSTGRES_USER}"
      KC_DB_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"

      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME}"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
      - "${KEYCLOAK_DEBUG_PORT}:9000"
    volumes:
      - ./keycloak:/opt/keycloak/data
    depends_on:
      - keycloak-db
    command: [ "start", "--http-enabled=true" ]
    networks:
      - main_network

  notes-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: notes-service
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT}:${SERVICE_PORT}"
    env_file:
      - .env
    environment:
      NOTES_SCHEMA: "${NOTES_SCHEMA}"
      SERVICE_PORT: "${SERVICE_PORT}"
      POSTGRES_URL: "${POSTGRES_URL}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"

    depends_on:
      - service-db

    networks:
      - main_network

volumes:
  db-data:
  keycloak-db-data:

networks:
  main_network:
    driver: bridge
